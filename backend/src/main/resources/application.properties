spring.application.name=distrofy-backend
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/distrofy}
spring.datasource.username=${DB_USERNAME:distrofy_user}
spring.datasource.password=${DB_PASSWORD:jeanjean123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

server.port=${SERVER_PORT:8080}
# Nota: sin context-path. Los controllers ya mapean /api/** explicitamente;
# con context-path=/api las URLs reales quedaban duplicadas (/api/api/...).

jwt.secret=${JWT_SECRET:clave_secreta_muy_segura_para_desarrollo_local_cambiar_en_produccion}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.jpa.defer-datasource-initialization=true

logging.level.com.distrofy.backend=DEBUG
logging.level.org.springframework.security=DEBUG
